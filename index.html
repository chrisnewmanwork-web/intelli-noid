<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ARKANOID — NEON BREACH</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap');

  :root {
    --bg: #030712;
    --grid: #0d1829;
    --neon-cyan: #00f5ff;
    --neon-pink: #ff006e;
    --neon-yellow: #ffe600;
    --neon-green: #39ff14;
    --neon-purple: #bf00ff;
    --neon-orange: #ff6200;
    --panel: rgba(0, 245, 255, 0.05);
    --border: rgba(0, 245, 255, 0.2);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-family: 'Share Tech Mono', monospace;
    overflow: hidden;
    position: relative;
  }

  /* Scanline overlay */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0,0,0,0.15) 2px,
      rgba(0,0,0,0.15) 4px
    );
    pointer-events: none;
    z-index: 100;
  }

  /* Grid background */
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,245,255,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,245,255,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  .game-wrapper {
    position: relative;
    z-index: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
    width: 100%;
    max-width: 500px;
  }

  .title {
    font-family: 'Orbitron', sans-serif;
    font-weight: 900;
    font-size: 28px;
    letter-spacing: 8px;
    color: var(--neon-cyan);
    text-shadow:
      0 0 10px var(--neon-cyan),
      0 0 30px var(--neon-cyan),
      0 0 60px rgba(0,245,255,0.4);
    text-align: center;
  }

  .title span {
    color: var(--neon-pink);
    text-shadow:
      0 0 10px var(--neon-pink),
      0 0 30px var(--neon-pink),
      0 0 60px rgba(255,0,110,0.4);
  }

  .hud {
    display: flex;
    gap: 20px;
    width: 100%;
    max-width: 480px;
    justify-content: space-between;
  }

  .hud-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2px;
  }

  .hud-label {
    font-size: 9px;
    letter-spacing: 3px;
    color: rgba(0,245,255,0.5);
    text-transform: uppercase;
  }

  .hud-value {
    font-family: 'Orbitron', sans-serif;
    font-size: 20px;
    font-weight: 700;
    color: var(--neon-cyan);
    text-shadow: 0 0 10px var(--neon-cyan), 0 0 20px rgba(0,245,255,0.5);
    min-width: 80px;
    text-align: center;
  }

  .lives-display {
    display: flex;
    gap: 6px;
    align-items: center;
  }

  .life-pip {
    width: 10px;
    height: 10px;
    background: var(--neon-pink);
    border-radius: 50%;
    box-shadow: 0 0 6px var(--neon-pink), 0 0 12px rgba(255,0,110,0.5);
    transition: all 0.3s;
  }

  .life-pip.empty {
    background: rgba(255,0,110,0.15);
    box-shadow: none;
    border: 1px solid rgba(255,0,110,0.2);
  }

  canvas {
    border: 1px solid var(--border);
    box-shadow:
      0 0 0 1px rgba(0,245,255,0.1),
      0 0 40px rgba(0,245,255,0.08),
      inset 0 0 40px rgba(0,0,0,0.5);
    display: block;
    cursor: none;
    width: 100%;
    max-width: 480px;
    height: auto;
  }

  .message-overlay {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: rgba(3,7,18,0.85);
    gap: 16px;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.4s;
  }

  .message-overlay.visible {
    opacity: 1;
    pointer-events: all;
  }

  .msg-title {
    font-family: 'Orbitron', sans-serif;
    font-weight: 900;
    font-size: 36px;
    letter-spacing: 6px;
    color: var(--neon-cyan);
    text-shadow: 0 0 20px var(--neon-cyan), 0 0 60px rgba(0,245,255,0.4);
    text-align: center;
  }

  .msg-title.pink {
    color: var(--neon-pink);
    text-shadow: 0 0 20px var(--neon-pink), 0 0 60px rgba(255,0,110,0.4);
  }

  .msg-subtitle {
    font-size: 13px;
    letter-spacing: 4px;
    color: rgba(0,245,255,0.6);
    text-align: center;
  }

  .msg-score {
    font-family: 'Orbitron', sans-serif;
    font-size: 22px;
    color: var(--neon-yellow);
    text-shadow: 0 0 10px var(--neon-yellow);
  }

  .start-btn {
    margin-top: 8px;
    padding: 12px 40px;
    background: transparent;
    border: 1px solid var(--neon-cyan);
    color: var(--neon-cyan);
    font-family: 'Orbitron', sans-serif;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 4px;
    cursor: pointer;
    text-transform: uppercase;
    box-shadow: 0 0 15px rgba(0,245,255,0.2), inset 0 0 15px rgba(0,245,255,0.05);
    transition: all 0.2s;
  }

  .start-btn:hover {
    background: rgba(0,245,255,0.1);
    box-shadow: 0 0 25px rgba(0,245,255,0.4), inset 0 0 25px rgba(0,245,255,0.1);
    transform: scale(1.03);
  }

  .canvas-container {
    position: relative;
  }

  .level-badge {
    font-family: 'Orbitron', sans-serif;
    font-size: 11px;
    letter-spacing: 3px;
    color: rgba(0,245,255,0.4);
    text-align: center;
  }
</style>
</head>
<body>

<div class="game-wrapper">
  <div class="title">NEON<span>BREACH</span></div>

  <div class="hud">
    <div class="hud-item">
      <div class="hud-label">Score</div>
      <div class="hud-value" id="score">0</div>
    </div>
    <div class="hud-item">
      <div class="hud-label">Level</div>
      <div class="hud-value" id="level">01</div>
    </div>
    <div class="hud-item">
      <div class="hud-label">Lives</div>
      <div class="lives-display" id="lives">
        <div class="life-pip"></div>
        <div class="life-pip"></div>
        <div class="life-pip"></div>
      </div>
    </div>
    <div class="hud-item">
      <div class="hud-label">High Score</div>
      <div class="hud-value" id="hiscore">0</div>
    </div>
  </div>

  <div class="canvas-container">
    <canvas id="canvas" width="480" height="540"></canvas>
    <div class="message-overlay visible" id="overlay">
      <div class="msg-title" id="overlayTitle">NEON BREACH</div>
      <div class="msg-subtitle" id="overlaySubtitle">MOVE MOUSE TO CONTROL PADDLE</div>
      <button class="start-btn" id="startBtn">INITIATE</button>
    </div>
  </div>

  <div class="level-badge" id="levelBadge">SECTOR 01 — GRID ASSAULT</div>
</div>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const W = canvas.width, H = canvas.height;

// Game state
let state = 'idle'; // idle, playing, paused, dead, win, gameover
let score = 0, hiScore = 0, lives = 3, level = 1;
let particles = [], powerUps = [], activePower = null, powerTimer = 0;
let shakeTime = 0, shakeAmt = 0;

// Ball
let ball = { x: W/2, y: H-80, vx: 0, vy: 0, r: 7, trail: [], speed: 5 };

// Paddle
let paddle = { x: W/2, y: H-28, w: 80, h: 12, target: W/2 };

// Bricks
let bricks = [];
const ROWS = 7, COLS = 10;
const BW = 42, BH = 16, BPAD = 4;
const BRICK_OFFSET_X = (W - (COLS*(BW+BPAD)-BPAD)) / 2;
const BRICK_OFFSET_Y = 60;

const BRICK_COLORS = [
  { fill: '#ff006e', glow: '#ff006e', pts: 70, hp: 1 },
  { fill: '#ff6200', glow: '#ff6200', pts: 50, hp: 1 },
  { fill: '#ffe600', glow: '#ffe600', pts: 40, hp: 1 },
  { fill: '#39ff14', glow: '#39ff14', pts: 30, hp: 1 },
  { fill: '#00f5ff', glow: '#00f5ff', pts: 20, hp: 1 },
  { fill: '#bf00ff', glow: '#bf00ff', pts: 20, hp: 1 },
  { fill: '#888', glow: '#aaa', pts: 0, hp: 2 },  // hard block
];

const POWER_TYPES = ['wide', 'laser', 'multi', 'slow', 'fast'];
const POWER_COLORS = {
  wide: '#00f5ff', laser: '#ff006e', multi: '#ffe600', slow: '#39ff14', fast: '#bf00ff'
};

const LEVEL_NAMES = [
  'GRID ASSAULT', 'FRACTAL STORM', 'PLASMA WALL', 'VOID MATRIX',
  'CIRCUIT BREAK', 'DATA SURGE', 'CORE MELTDOWN'
];

let extraBalls = [];
let laserShots = [];
let laserCooldown = 0;

function initLevel() {
  bricks = [];
  extraBalls = [];
  laserShots = [];
  activePower = null;
  powerTimer = 0;
  laserCooldown = 0;
  powerUps = [];

  const speedBoost = 1 + (level - 1) * 0.08;
  ball.speed = 5 * speedBoost;

  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      // Level-based patterns
      let skip = false;
      if (level === 1) {
        // Simple full grid minus corners
        if ((r === 0 && (c === 0 || c === COLS-1))) skip = true;
      } else if (level === 2) {
        // Diamond pattern
        const dr = Math.abs(r - ROWS/2), dc = Math.abs(c - COLS/2);
        if (dr + dc > ROWS/2 + 1) skip = true;
      } else if (level === 3) {
        // Checkerboard + full top rows
        if (r > 1 && (r + c) % 2 === 0) skip = true;
      } else if (level === 4) {
        // X pattern
        if (r !== c && r !== ROWS-1-c && r > 0 && r < ROWS-1) skip = Math.random() > 0.5 ? false : true;
      }

      if (skip) continue;

      let colorIdx;
      if (r === 0) colorIdx = 6; // hard row
      else colorIdx = Math.min(r, BRICK_COLORS.length - 2);

      const bc = { ...BRICK_COLORS[colorIdx] };
      bricks.push({
        x: BRICK_OFFSET_X + c * (BW + BPAD),
        y: BRICK_OFFSET_Y + r * (BH + BPAD),
        w: BW, h: BH,
        alive: true,
        hp: bc.hp,
        maxHp: bc.hp,
        fill: bc.fill,
        glow: bc.glow,
        pts: bc.pts,
        hasPower: Math.random() < 0.12 ? POWER_TYPES[Math.floor(Math.random()*POWER_TYPES.length)] : null,
        flashTime: 0
      });
    }
  }

  resetBall();
  document.getElementById('levelBadge').textContent = `SECTOR ${String(level).padStart(2,'0')} — ${LEVEL_NAMES[(level-1) % LEVEL_NAMES.length]}`;
}

function resetBall() {
  ball.x = paddle.x;
  ball.y = H - 60;
  const angle = -Math.PI/2 + (Math.random()-0.5)*0.6;
  ball.vx = Math.cos(angle) * ball.speed;
  ball.vy = Math.sin(angle) * ball.speed;
  ball.trail = [];
  extraBalls = [];
  laserShots = [];
}

function spawnParticles(x, y, color, count=12) {
  for (let i = 0; i < count; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = 1.5 + Math.random() * 3.5;
    particles.push({
      x, y,
      vx: Math.cos(angle)*speed,
      vy: Math.sin(angle)*speed,
      life: 1,
      decay: 0.03 + Math.random()*0.04,
      size: 2 + Math.random()*3,
      color
    });
  }
}

function screenShake(amt, dur) {
  shakeAmt = amt;
  shakeTime = dur;
}

function updateScore() {
  document.getElementById('score').textContent = score;
  document.getElementById('hiscore').textContent = hiScore;
  document.getElementById('level').textContent = String(level).padStart(2,'0');
  updateLives();
}

function updateLives() {
  const container = document.getElementById('lives');
  container.innerHTML = '';
  for (let i = 0; i < 3; i++) {
    const pip = document.createElement('div');
    pip.className = 'life-pip' + (i >= lives ? ' empty' : '');
    container.appendChild(pip);
  }
}


// Touch and mouse controls anywhere on the page
function getPointerX(e) {
  let clientX;
  if (e.touches && e.touches.length) {
    clientX = e.touches[0].clientX;
  } else {
    clientX = e.clientX;
  }
  // Map to canvas coordinates
  const rect = canvas.getBoundingClientRect();
  // Clamp to canvas bounds
  return Math.max(0, Math.min(rect.width, clientX - rect.left));
}

canvas.addEventListener('mousemove', e => {
  paddle.target = getPointerX(e);
});

document.body.addEventListener('touchmove', e => {
  paddle.target = getPointerX(e);
  e.preventDefault();
}, {passive:false});

canvas.addEventListener('click', e => {
  if (state === 'idle' || state === 'ready') {
    startGame();
  }
});

document.body.addEventListener('touchstart', e => {
  if (state === 'paused') {
    state = 'playing';
  } else if (state === 'idle' || state === 'ready') {
    startGame();
  }
});

document.addEventListener('keydown', e => {
  if (e.code === 'Space') {
    if (state === 'idle') startGame();
    else if (state === 'playing') state = 'paused';
    else if (state === 'paused') state = 'playing';
  }
});

document.getElementById('startBtn').addEventListener('click', startGame);

function showOverlay(title, subtitle, score, btnText, pink=false) {
  const ov = document.getElementById('overlay');
  document.getElementById('overlayTitle').textContent = title;
  document.getElementById('overlayTitle').className = 'msg-title' + (pink ? ' pink' : '');
  document.getElementById('overlaySubtitle').textContent = subtitle;
  document.getElementById('startBtn').textContent = btnText;
  ov.classList.add('visible');
}

function hideOverlay() {
  document.getElementById('overlay').classList.remove('visible');
}

function startGame() {
  score = 0; lives = 3; level = 1;
  particles = []; powerUps = [];
  paddle.x = W/2; paddle.target = W/2;
  state = 'playing';
  hideOverlay();
  initLevel();
  updateScore();
  loop();
}

function nextLevel() {
  level++;
  if (level > 7) {
    state = 'win';
    showOverlay('YOU WIN', `FINAL SCORE: ${score}`, score, 'PLAY AGAIN');
    return;
  }
  state = 'playing';
  initLevel();
  updateScore();
}

let lastTime = 0;
function loop(ts = 0) {
  if (state === 'gameover' || state === 'win' || state === 'idle') return;

  requestAnimationFrame(loop);

  const dt = Math.min((ts - lastTime) / 16.67, 3);
  lastTime = ts;

  if (state === 'playing') {
    update(dt);
  }
  render();
}

function update(dt) {
  // Paddle movement
  paddle.x += (paddle.target - paddle.x) * 0.18;
  let pw = activePower === 'wide' ? 120 : 80;
  paddle.x = Math.max(pw/2, Math.min(W - pw/2, paddle.x));

  // Laser cooldown
  if (laserCooldown > 0) laserCooldown -= dt;
  if (activePower === 'laser' && laserCooldown <= 0) {
    laserShots.push({ x: paddle.x - 30, y: paddle.y - 10, vy: -12 });
    laserShots.push({ x: paddle.x + 30, y: paddle.y - 10, vy: -12 });
    laserCooldown = 15;
  }

  // Power timer
  if (activePower) {
    powerTimer -= dt;
    if (powerTimer <= 0) activePower = null;
  }

  // Update laser shots
  laserShots = laserShots.filter(l => {
    l.y += l.vy * dt;
    // Check brick collision
    for (let b of bricks) {
      if (!b.alive) continue;
      if (l.x > b.x && l.x < b.x+b.w && l.y > b.y && l.y < b.y+b.h) {
        hitBrick(b, l.x, l.y);
        return false;
      }
    }
    return l.y > 0;
  });

  // Move all balls (main + extra)
  const allBalls = [ball, ...extraBalls];
  const speedMod = activePower === 'slow' ? 0.6 : activePower === 'fast' ? 1.4 : 1;

  allBalls.forEach((b, bi) => {
    b.x += b.vx * dt * speedMod;
    b.y += b.vy * dt * speedMod;

    // Trail
    b.trail.push({ x: b.x, y: b.y, life: 1 });
    if (b.trail.length > 12) b.trail.shift();
    b.trail.forEach(t => t.life -= 0.08);

    // Walls
    if (b.x - b.r < 0) { b.x = b.r; b.vx = Math.abs(b.vx); }
    if (b.x + b.r > W) { b.x = W - b.r; b.vx = -Math.abs(b.vx); }
    if (b.y - b.r < 0) { b.y = b.r; b.vy = Math.abs(b.vy); }

    // Paddle collision
    const pw2 = (activePower === 'wide' ? 120 : 80) / 2;
    if (b.vy > 0 &&
        b.y + b.r >= paddle.y - 4 &&
        b.y + b.r <= paddle.y + 8 &&
        b.x >= paddle.x - pw2 - 5 &&
        b.x <= paddle.x + pw2 + 5) {

      const hitPos = (b.x - paddle.x) / pw2;
      const angle = hitPos * (Math.PI/3);
      const spd = Math.sqrt(b.vx*b.vx + b.vy*b.vy);
      b.vx = Math.sin(angle) * spd;
      b.vy = -Math.abs(Math.cos(angle) * spd);
      b.y = paddle.y - b.r - 4;
      spawnParticles(b.x, paddle.y, '#00f5ff', 6);
    }

    // Brick collision
    for (let brick of bricks) {
      if (!brick.alive) continue;
      const bx = brick.x, by = brick.y, bw = brick.w, bh = brick.h;
      const closestX = Math.max(bx, Math.min(b.x, bx+bw));
      const closestY = Math.max(by, Math.min(b.y, by+bh));
      const dx = b.x - closestX, dy = b.y - closestY;
      const dist = Math.sqrt(dx*dx + dy*dy);

      if (dist < b.r) {
        // Resolve
        const overlapX = (b.x > bx && b.x < bx+bw);
        const overlapY = (b.y > by && b.y < by+bh);

        if (!overlapX && !overlapY) {
          // Corner
          b.vx = -b.vx; b.vy = -b.vy;
        } else if (Math.abs(dy) > Math.abs(dx)) {
          b.vy = -b.vy;
          b.y += b.vy > 0 ? 1 : -1;
        } else {
          b.vx = -b.vx;
          b.x += b.vx > 0 ? 1 : -1;
        }

        hitBrick(brick, b.x, b.y);
        break;
      }
    }

    // Ball lost
    if (b.y > H + 20) {
      if (bi === 0) {
        // Main ball lost
        extraBalls = [];
        lives--;
        updateLives();
        screenShake(6, 20);
        if (lives <= 0) {
          state = 'gameover';
          if (score > hiScore) hiScore = score;
          updateScore();
          showOverlay('GAME OVER', `FINAL SCORE: ${score}`, score, 'RETRY', true);
        } else {
          resetBall();
        }
      } else {
        // Extra ball lost - remove it
        extraBalls.splice(bi - 1, 1);
      }
    }
  });

  // Power ups
  powerUps = powerUps.filter(pu => {
    pu.y += 1.5 * dt;
    pu.rot = (pu.rot || 0) + 0.05 * dt;
    const pw2 = (activePower === 'wide' ? 120 : 80) / 2;
    if (Math.abs(pu.x - paddle.x) < pw2 + 10 &&
        Math.abs(pu.y - paddle.y) < 20) {
      activePower = pu.type;
      powerTimer = 600;
      spawnParticles(pu.x, pu.y, POWER_COLORS[pu.type], 20);
      if (pu.type === 'multi') {
        // Spawn extra balls
        for (let i = 0; i < 2; i++) {
          const a = Math.random() * Math.PI * 2;
          extraBalls.push({
            x: ball.x, y: ball.y,
            vx: Math.cos(a) * ball.speed,
            vy: -Math.abs(Math.sin(a) * ball.speed) - 2,
            r: 7, trail: [], speed: ball.speed
          });
        }
      }
      return false;
    }
    return pu.y < H + 20;
  });

  // Particles
  particles = particles.filter(p => {
    p.x += p.vx * dt;
    p.y += p.vy * dt;
    p.vy += 0.1 * dt;
    p.life -= p.decay * dt;
    return p.life > 0;
  });

  // Screen shake
  if (shakeTime > 0) shakeTime -= dt;

  // Check win
  if (bricks.filter(b => b.alive && b.pts > 0).length === 0) {
    screenShake(4, 30);
    spawnParticles(W/2, H/2, '#ffe600', 60);
    setTimeout(nextLevel, 600);
    state = 'transitioning';
  }
}

function hitBrick(brick, bx, by) {
  brick.hp--;
  brick.flashTime = 8;
  if (brick.hp <= 0) {
    brick.alive = false;
    score += brick.pts;
    if (score > hiScore) hiScore = score;
    updateScore();
    spawnParticles(brick.x + brick.w/2, brick.y + brick.h/2, brick.glow, 14);
    screenShake(2, 8);
    if (brick.hasPower) {
      powerUps.push({ x: brick.x + brick.w/2, y: brick.y + brick.h/2, type: brick.hasPower, rot: 0 });
    }
  }
}

function render() {
  // Shake transform
  let sx = 0, sy = 0;
  if (shakeTime > 0) {
    sx = (Math.random()-0.5) * shakeAmt;
    sy = (Math.random()-0.5) * shakeAmt;
  }

  ctx.save();
  ctx.translate(sx, sy);
  ctx.clearRect(-10, -10, W+20, H+20);

  // Background
  ctx.fillStyle = '#030712';
  ctx.fillRect(-10, -10, W+20, H+20);

  // Subtle glow vignette at top
  const topGrad = ctx.createLinearGradient(0, 0, 0, H*0.4);
  topGrad.addColorStop(0, 'rgba(0,245,255,0.03)');
  topGrad.addColorStop(1, 'transparent');
  ctx.fillStyle = topGrad;
  ctx.fillRect(0, 0, W, H);

  // Bricks
  for (const b of bricks) {
    if (!b.alive) continue;
    if (b.flashTime > 0) b.flashTime--;

    const flash = b.flashTime > 0 && b.flashTime % 3 < 2;
    const fillColor = flash ? '#fff' : b.fill;
    const alpha = b.hp === 1 && b.maxHp === 2 ? 0.5 : 1;

    ctx.save();
    ctx.globalAlpha = alpha;

    // Glow
    ctx.shadowColor = b.glow;
    ctx.shadowBlur = flash ? 20 : 8;

    ctx.fillStyle = fillColor;
    ctx.fillRect(b.x, b.y, b.w, b.h);

    // Inner shine
    const shine = ctx.createLinearGradient(b.x, b.y, b.x, b.y + b.h);
    shine.addColorStop(0, 'rgba(255,255,255,0.25)');
    shine.addColorStop(1, 'rgba(0,0,0,0.1)');
    ctx.fillStyle = shine;
    ctx.fillRect(b.x, b.y, b.w, b.h * 0.5);

    ctx.restore();
  }

  // Laser shots
  ctx.save();
  ctx.shadowColor = '#ff006e';
  ctx.shadowBlur = 12;
  ctx.fillStyle = '#ff006e';
  for (const l of laserShots) {
    ctx.fillRect(l.x - 2, l.y - 10, 4, 20);
  }
  ctx.restore();

  // Power ups
  for (const pu of powerUps) {
    ctx.save();
    ctx.translate(pu.x, pu.y);
    ctx.rotate(pu.rot || 0);
    ctx.shadowColor = POWER_COLORS[pu.type];
    ctx.shadowBlur = 15;
    ctx.fillStyle = POWER_COLORS[pu.type];
    ctx.fillRect(-10, -10, 20, 20);
    ctx.strokeStyle = '#fff';
    ctx.lineWidth = 1;
    ctx.strokeRect(-10, -10, 20, 20);

    // Letter
    ctx.fillStyle = '#000';
    ctx.font = 'bold 11px monospace';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.shadowBlur = 0;
    const labels = {wide:'W',laser:'L',multi:'M',slow:'S',fast:'F'};
    ctx.fillText(labels[pu.type], 0, 0);
    ctx.restore();
  }

  // Ball trails + balls
  const allBalls = [ball, ...extraBalls];
  allBalls.forEach((b, bi) => {
    // Trail
    b.trail.forEach((t, i) => {
      const alpha = (i/b.trail.length) * t.life * 0.5;
      ctx.save();
      ctx.globalAlpha = alpha;
      ctx.fillStyle = bi === 0 ? '#00f5ff' : '#ffe600';
      ctx.beginPath();
      ctx.arc(t.x, t.y, b.r * (i/b.trail.length) * 0.8, 0, Math.PI*2);
      ctx.fill();
      ctx.restore();
    });

    // Ball
    ctx.save();
    const ballColor = bi === 0 ? '#00f5ff' : '#ffe600';
    ctx.shadowColor = ballColor;
    ctx.shadowBlur = 20;
    const grad = ctx.createRadialGradient(b.x - 2, b.y - 2, 1, b.x, b.y, b.r);
    grad.addColorStop(0, '#fff');
    grad.addColorStop(0.4, ballColor);
    grad.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.arc(b.x, b.y, b.r, 0, Math.PI*2);
    ctx.fill();
    ctx.restore();
  });

  // Paddle
  const pw = activePower === 'wide' ? 120 : 80;
  const padX = paddle.x - pw/2;
  ctx.save();
  ctx.shadowColor = '#00f5ff';
  ctx.shadowBlur = activePower === 'wide' ? 30 : 18;

  // Paddle body
  const padGrad = ctx.createLinearGradient(padX, paddle.y, padX, paddle.y + paddle.h);
  padGrad.addColorStop(0, '#00f5ff');
  padGrad.addColorStop(0.5, '#0099cc');
  padGrad.addColorStop(1, '#005577');
  ctx.fillStyle = padGrad;

  // Rounded rect
  const r = 5;
  ctx.beginPath();
  ctx.moveTo(padX + r, paddle.y);
  ctx.lineTo(padX + pw - r, paddle.y);
  ctx.quadraticCurveTo(padX + pw, paddle.y, padX + pw, paddle.y + r);
  ctx.lineTo(padX + pw, paddle.y + paddle.h - r);
  ctx.quadraticCurveTo(padX + pw, paddle.y + paddle.h, padX + pw - r, paddle.y + paddle.h);
  ctx.lineTo(padX + r, paddle.y + paddle.h);
  ctx.quadraticCurveTo(padX, paddle.y + paddle.h, padX, paddle.y + paddle.h - r);
  ctx.lineTo(padX, paddle.y + r);
  ctx.quadraticCurveTo(padX, paddle.y, padX + r, paddle.y);
  ctx.closePath();
  ctx.fill();

  // Shine
  ctx.fillStyle = 'rgba(255,255,255,0.3)';
  ctx.fillRect(padX + 4, paddle.y + 2, pw - 8, 3);

  // Power indicator on paddle
  if (activePower) {
    ctx.strokeStyle = POWER_COLORS[activePower];
    ctx.lineWidth = 1.5;
    ctx.shadowColor = POWER_COLORS[activePower];
    ctx.shadowBlur = 10;
    ctx.strokeRect(padX + 2, paddle.y + 2, pw - 4, paddle.h - 4);
  }
  ctx.restore();

  // Particles
  for (const p of particles) {
    ctx.save();
    ctx.globalAlpha = p.life;
    ctx.shadowColor = p.color;
    ctx.shadowBlur = 8;
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI*2);
    ctx.fill();
    ctx.restore();
  }

  // Power timer bar
  if (activePower && powerTimer > 0) {
    const barW = (powerTimer / 600) * (W - 40);
    ctx.save();
    ctx.shadowColor = POWER_COLORS[activePower];
    ctx.shadowBlur = 10;
    ctx.fillStyle = 'rgba(0,0,0,0.4)';
    ctx.fillRect(20, H - 10, W - 40, 4);
    ctx.fillStyle = POWER_COLORS[activePower];
    ctx.fillRect(20, H - 10, barW, 4);
    ctx.restore();
  }

  // Paused text
  if (state === 'paused') {
    ctx.save();
    ctx.fillStyle = 'rgba(3,7,18,0.7)';
    ctx.fillRect(0, 0, W, H);
    ctx.font = '700 28px Orbitron, monospace';
    ctx.fillStyle = '#00f5ff';
    ctx.textAlign = 'center';
    ctx.shadowColor = '#00f5ff';
    ctx.shadowBlur = 20;
    ctx.fillText('PAUSED', W/2, H/2);
    ctx.font = '11px Share Tech Mono, monospace';
    ctx.fillStyle = 'rgba(0,245,255,0.5)';
    ctx.shadowBlur = 0;
    ctx.fillText('PRESS SPACE TO RESUME', W/2, H/2 + 30);
    ctx.restore();
  }

  ctx.restore();
}

// Auto-pause when finger is lifted
function autoPause() {
  if (state === 'playing') {
    state = 'paused';
  }
}
document.body.addEventListener('touchend', autoPause);
document.body.addEventListener('touchcancel', autoPause);

// Show initial overlay
showOverlay('NEON BREACH', 'MOVE MOUSE TO CONTROL PADDLE', 0, 'INITIATE');
</script>
</body>
